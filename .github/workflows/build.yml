name: Build GoFlow APK

# Runs automatically whenever files are uploaded, and can be run by hand.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the uploaded files
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Keep a copy of our app files
        run: |
          mkdir -p /tmp/keep/lib
          cp pubspec.yaml /tmp/keep/pubspec.yaml
          cp lib/main.dart /tmp/keep/lib/main.dart

      - name: Create the Android project scaffold
        run: flutter create . --platforms=android --project-name goflow_app --org com.goflow

      - name: Put our app files back
        run: |
          cp /tmp/keep/pubspec.yaml pubspec.yaml
          cp /tmp/keep/lib/main.dart lib/main.dart

      - name: Add the Bluetooth permissions
        run: |
          sed -i 's#<application#<uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />\n    <application#' android/app/src/main/AndroidManifest.xml

      - name: Download the packages
        run: flutter pub get

      - name: Build the app
        run: flutter build apk --release

      - name: Name it GoFlow.apk
        run: cp build/app/outputs/flutter-apk/app-release.apk GoFlow.apk

      - name: Hand over the finished app
        uses: actions/upload-artifact@v4
        with:
          name: GoFlow-app
          path: GoFlow.apk
